syntax = "proto3";

package mmo;

import "common.proto";

message NetworkMessage {
    uint32 msg_id = 1;
    uint64 session_id = 2;
    bytes data = 3;
    int64 timestamp = 4;
}

message MessageHeader {
    uint32 msg_id = 1;
    uint32 msg_len = 2;
    uint64 session_id = 3;
}

message ClientConnect {
    string client_id = 1;
    string ip_address = 2;
    int32 port = 3;
}

message ClientDisconnect {
    string client_id = 1;
    uint64 session_id = 2;
}

message ErrorMessage {
    int32 error_code = 1;
    string error_msg = 2;
}
